version: 2

models:
  - name: stg_customers
    description: "Staging model for active customers"
    columns:
      - name: customer_id
        description: "Unique identifier for a customer"
        tests:
          - not_null
          - unique
      - name: email
        description: "Email address of the customer"
        tests:
          - not_null
      - name: created_at
        description: "Timestamp when the customer record was created"
        tests:
          - not_null